name: CI and deployment

on:
  pull_request:
  push:
    branches: [main]

# Start with no token access and grant only what each job needs.
permissions: {}

jobs:
  test:
    name: Test, lint, and type-check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # GitHub Actions cache (free for public repos, ~10GB soft cap with
      # automatic LRU eviction -- no failure or cost if exceeded, just reduced
      # hit rate). Shares the `docker-image` scope with the publish job below,
      # so a PR's test build and main's publish build reuse the same layers
      # instead of each separately re-downloading the ~3GB of PyTorch/CUDA
      # wheels image.upscale needs (see assets/realesrgan/README.md).
      - name: Build the test image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: uniche-media-editor:test
          cache-from: type=gha,scope=docker-image
          cache-to: type=gha,mode=max,scope=docker-image

      - name: Lint
        run: docker run --rm uniche-media-editor:test ruff check .

      - name: Type-check
        run: docker run --rm uniche-media-editor:test mypy app

      - name: Test
        run: docker run --rm uniche-media-editor:test pytest

  publish:
    name: Publish image
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out the tested revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Derive the lowercase image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Same `docker-image` cache scope as the test job above, so this build
      # reuses those layers instead of re-downloading everything again.
      - name: Build and publish the immutable image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
            ${{ steps.image.outputs.name }}:main
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=docker-image
          cache-to: type=gha,mode=max,scope=docker-image

  deploy:
    name: Deploy to production
    if: github.event_name != 'pull_request'
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    concurrency:
      group: production
      cancel-in-progress: false
    environment: production
    permissions:
      contents: read
    steps:
      - name: Check out the deployed revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Deploy over verified SSH
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_HOST_KEY: ${{ secrets.DEPLOY_SSH_HOST_KEY }}
          IMAGE: ${{ needs.publish.outputs.image }}@${{ needs.publish.outputs.digest }}
        run: |
          set -Eeuo pipefail
          umask 077

          key_file="$RUNNER_TEMP/deploy_key"
          known_hosts_file="$RUNNER_TEMP/known_hosts"
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$key_file"
          printf '%s\n' "$DEPLOY_SSH_HOST_KEY" > "$known_hosts_file"

          ssh_options=(
            -i "$key_file"
            -o BatchMode=yes
            -o ConnectTimeout=15
            -o IdentitiesOnly=yes
            -o ServerAliveCountMax=3
            -o ServerAliveInterval=15
            -o StrictHostKeyChecking=yes
            -o "UserKnownHostsFile=$known_hosts_file"
          )
          target="$DEPLOY_USER@$DEPLOY_HOST"

          scp "${ssh_options[@]}" compose.prod.yml "$target:/opt/uniche-media-editor/compose.prod.yml.new"
          ssh "${ssh_options[@]}" "$target" \
            bash -s -- "$IMAGE" /opt/uniche-media-editor < deploy/deploy.sh
