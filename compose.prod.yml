name: uniche-media-editor

x-app: &app
  image: ${APP_IMAGE:?APP_IMAGE must be an immutable GHCR image reference}
  env_file:
    - .env
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  migrate:
    <<: *app
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips", "*"]
    ports:
      # Only the host's Nginx can reach the API directly.
      - "127.0.0.1:8000:8000"
    volumes:
      - storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  worker:
    <<: *app
    command: ["arq", "app.workers.worker.WorkerSettings"]
    volumes:
      - storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # GPU passthrough for image.upscale (Real-ESRGAN via Vulkan). Requires the
    # NVIDIA driver + nvidia-container-toolkit on the host (see DEPLOYMENT.md);
    # only worker executes capability jobs in production, so api doesn't need it.
    # Uses CDI (driver: cdi + nvidia.com/gpu=0, generated on the host via
    # `nvidia-ctk cdi generate`), not the legacy `driver: nvidia` mechanism:
    # the legacy mechanism's live capability discovery silently failed to
    # mount the Vulkan ICD for the "graphics" capability on this host even
    # with NVIDIA_DRIVER_CAPABILITIES=all (confirmed via `nvidia-container-cli
    # list --graphics` finding nothing, while nvidia-smi/compute worked fine)
    # -- realesrgan-ncnn-vulkan kept falling back to CPU. CDI's static,
    # pre-generated device spec includes the Vulkan ICD correctly (confirmed
    # via `nvidia-ctk cdi generate` + grep), so NVIDIA_DRIVER_CAPABILITIES no
    # longer applies here -- CDI doesn't consult it.
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids: ["nvidia.com/gpu=0"]
              capabilities: [gpu]

volumes:
  pgdata:
  redisdata:
  storage:
